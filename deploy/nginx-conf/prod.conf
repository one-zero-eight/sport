server {
    listen 80;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host $host;

    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript font/ttf;

    server_tokens off;

    location / {
        proxy_pass http://adminpanel:8000;
    }

    location /static/ {
        root /;
    }

    location /files/ {
        autoindex on;
        internal;
        alias /media/;
    }

    location = /favicon.ico {
        alias /static/sport/images/favicon.ico;
    }

    client_max_body_size 15M;
}

